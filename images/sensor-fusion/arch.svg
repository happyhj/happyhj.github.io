<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" width="640" height="280">
  <rect width="640" height="280" fill="#f7f7f7"/>

  <!-- Title -->
  <text x="320" y="22" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" fill="#888">System Architecture</text>

  <!-- Mobile Device box -->
  <rect x="20" y="40" width="180" height="210" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <rect x="20" y="40" width="180" height="28" rx="2" fill="#1a5276"/>
  <rect x="20" y="66" width="180" height="0.5" fill="#1a5276"/>
  <text x="110" y="59" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="13" font-weight="600" fill="#fff">Mobile Device</text>

  <!-- Sensor boxes inside mobile -->
  <rect x="35" y="80" width="150" height="32" rx="2" fill="#f7f7f7" stroke="#ddd" stroke-width="1"/>
  <text x="110" y="100" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" fill="#111">Gyroscope</text>

  <rect x="35" y="122" width="150" height="32" rx="2" fill="#f7f7f7" stroke="#ddd" stroke-width="1"/>
  <text x="110" y="142" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" fill="#111">Accelerometer</text>

  <rect x="35" y="164" width="150" height="32" rx="2" fill="#f7f7f7" stroke="#ddd" stroke-width="1"/>
  <text x="110" y="184" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" fill="#111">Gravity Sensor</text>

  <!-- Sensor data label -->
  <text x="110" y="220" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">60 Hz sampling</text>
  <text x="110" y="240" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">x, y, z per sensor</text>

  <!-- WebRTC DataChannel arrow -->
  <line x1="200" y1="145" x2="280" y2="145" stroke="#1a5276" stroke-width="2"/>
  <polygon points="280,145 272,140 272,150" fill="#1a5276"/>
  <!-- Bidirectional indicator -->
  <line x1="280" y1="155" x2="200" y2="155" stroke="#1a5276" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="200,155 208,150 208,160" fill="#1a5276"/>

  <rect x="215" y="122" width="50" height="16" fill="#f7f7f7"/>
  <text x="240" y="133" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#1a5276">WebRTC</text>
  <text x="240" y="170" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">DataChannel</text>

  <!-- PC Browser box -->
  <rect x="290" y="40" width="330" height="210" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <rect x="290" y="40" width="330" height="28" rx="2" fill="#1a5276"/>
  <rect x="290" y="66" width="330" height="0.5" fill="#1a5276"/>
  <text x="455" y="59" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="13" font-weight="600" fill="#fff">PC Browser</text>

  <!-- Canvas Waveform Viz -->
  <rect x="305" y="78" width="195" height="110" rx="2" fill="#f7f7f7" stroke="#ddd" stroke-width="1"/>
  <text x="402" y="96" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" font-weight="600" fill="#111">Canvas Waveform Viz</text>

  <!-- Waveform lines (3 colored channels) -->
  <!-- Channel X (red-ish) -->
  <path d="M315,125 Q330,110 345,125 Q360,140 375,125 Q390,110 405,125 Q420,140 435,125 Q450,110 465,125 Q480,140 490,125" fill="none" stroke="#c0392b" stroke-width="1.5"/>
  <!-- Channel Y (blue-ish) -->
  <path d="M315,140 Q330,130 345,140 Q360,150 375,135 Q390,120 405,140 Q420,160 435,140 Q450,120 465,140 Q480,155 490,140" fill="none" stroke="#1a5276" stroke-width="1.5"/>
  <!-- Channel Z (green-ish) -->
  <path d="M315,155 Q330,150 345,158 Q360,165 375,155 Q390,145 405,155 Q420,165 435,160 Q450,150 465,155 Q480,162 490,155" fill="none" stroke="#27ae60" stroke-width="1.5"/>

  <!-- Channel labels -->
  <text x="315" y="180" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#c0392b">x</text>
  <text x="335" y="180" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#1a5276">y</text>
  <text x="355" y="180" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#27ae60">z</text>

  <!-- Parameter Controls panel -->
  <rect x="510" y="78" width="100" height="110" rx="2" fill="#f7f7f7" stroke="#ddd" stroke-width="1"/>
  <text x="560" y="96" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" font-weight="600" fill="#111">Controls</text>
  <!-- Slider controls -->
  <line x1="520" y1="112" x2="600" y2="112" stroke="#ddd" stroke-width="2"/>
  <circle cx="555" cy="112" r="4" fill="#1a5276" stroke="#111" stroke-width="0.5"/>
  <text x="520" y="108" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="8" fill="#888">alpha</text>

  <line x1="520" y1="135" x2="600" y2="135" stroke="#ddd" stroke-width="2"/>
  <circle cx="570" cy="135" r="4" fill="#1a5276" stroke="#111" stroke-width="0.5"/>
  <text x="520" y="131" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="8" fill="#888">beta</text>

  <line x1="520" y1="158" x2="600" y2="158" stroke="#ddd" stroke-width="2"/>
  <circle cx="545" cy="158" r="4" fill="#1a5276" stroke="#111" stroke-width="0.5"/>
  <text x="520" y="154" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="8" fill="#888">gamma</text>

  <line x1="520" y1="181" x2="600" y2="181" stroke="#ddd" stroke-width="2"/>
  <circle cx="560" cy="181" r="4" fill="#1a5276" stroke="#111" stroke-width="0.5"/>
  <text x="520" y="177" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="8" fill="#888">scale</text>

  <!-- Status bar -->
  <text x="455" y="230" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">Real-time visualization + parameter tuning</text>
  <text x="455" y="242" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">No server required (peer-to-peer)</text>
</svg>