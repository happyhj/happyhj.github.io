<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" width="640" height="280">
  <rect width="640" height="280" fill="#f7f7f7"/>

  <!-- Title -->
  <text x="320" y="22" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" fill="#888">TurtleTalk Architecture</text>

  <!-- Child speaking (voice icon) -->
  <circle cx="60" cy="120" r="30" fill="#fff" stroke="#111" stroke-width="1"/>
  <!-- Simple face -->
  <circle cx="50" cy="114" r="3" fill="#111"/>
  <circle cx="70" cy="114" r="3" fill="#111"/>
  <path d="M50,126 Q60,134 70,126" fill="none" stroke="#111" stroke-width="1.5"/>
  <!-- Sound waves -->
  <path d="M92,110 Q98,120 92,130" fill="none" stroke="#1a5276" stroke-width="1.5"/>
  <path d="M98,105 Q106,120 98,135" fill="none" stroke="#1a5276" stroke-width="1.2"/>
  <path d="M104,100 Q114,120 104,140" fill="none" stroke="#1a5276" stroke-width="0.8"/>
  <text x="60" y="165" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" fill="#555">Child speaks</text>
  <text x="60" y="177" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" fill="#555">a command</text>

  <!-- Arrow to Web Speech API -->
  <line x1="110" y1="120" x2="155" y2="120" stroke="#111" stroke-width="1"/>
  <polygon points="155,120 148,116 148,124" fill="#111"/>

  <!-- Web Speech API box -->
  <rect x="160" y="95" width="120" height="50" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <text x="220" y="117" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" font-weight="600" fill="#111">Web Speech</text>
  <text x="220" y="132" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" font-weight="600" fill="#111">API</text>
  <text x="220" y="157" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">Voice to Text</text>

  <!-- Arrow to Command Parser -->
  <line x1="280" y1="120" x2="325" y2="120" stroke="#111" stroke-width="1"/>
  <polygon points="325,120 318,116 318,124" fill="#111"/>

  <!-- Command Parser box -->
  <rect x="330" y="95" width="120" height="50" rx="2" fill="#1a5276" stroke="#111" stroke-width="1"/>
  <text x="390" y="117" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" font-weight="600" fill="#fff">Command</text>
  <text x="390" y="132" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" font-weight="600" fill="#fff">Parser</text>
  <text x="390" y="157" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">NLP Processing</text>

  <!-- Arrow to Turtle Graphics Canvas -->
  <line x1="450" y1="120" x2="495" y2="120" stroke="#111" stroke-width="1"/>
  <polygon points="495,120 488,116 488,124" fill="#111"/>

  <!-- Turtle Graphics Canvas box -->
  <rect x="500" y="70" width="120" height="100" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <text x="560" y="90" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" font-weight="600" fill="#111">Turtle Graphics</text>
  <text x="560" y="103" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" font-weight="600" fill="#111">Canvas</text>

  <!-- Turtle icon (triangle) -->
  <polygon points="545,130 555,145 535,145" fill="#1a5276" stroke="#111" stroke-width="0.5"/>
  <!-- Drawing line from turtle -->
  <path d="M555,145 L570,135 L580,150 L565,155" fill="none" stroke="#1a5276" stroke-width="1.5"/>
  <!-- Small star/shape drawn -->
  <polygon points="575,125 577,132 584,132 578,136 580,143 575,139 570,143 572,136 566,132 573,132" fill="none" stroke="#1a5276" stroke-width="0.5"/>

  <!-- Side branch: Google Translate API -->
  <rect x="330" y="210" width="120" height="50" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <text x="390" y="232" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" font-weight="600" fill="#111">Google</text>
  <text x="390" y="247" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" font-weight="600" fill="#111">Translate API</text>

  <!-- Bidirectional arrow between Command Parser and Google Translate -->
  <line x1="390" y1="145" x2="390" y2="210" stroke="#111" stroke-width="1"/>
  <polygon points="390,210 386,203 394,203" fill="#111"/>
  <line x1="380" y1="210" x2="380" y2="145" stroke="#111" stroke-width="1" stroke-dasharray="3,3"/>
  <polygon points="380,145 376,152 384,152" fill="#111"/>

  <!-- Multilingual label -->
  <text x="355" y="180" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">multi-</text>
  <text x="355" y="192" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">lingual</text>

  <!-- Language examples -->
  <text x="390" y="270" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">EN / KO / ES / JA / ...</text>
</svg>