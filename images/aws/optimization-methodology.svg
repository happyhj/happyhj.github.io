<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <rect width="640" height="160" fill="#f7f7f7"/>

  <!-- Connecting line -->
  <line x1="80" y1="75" x2="560" y2="75" stroke="#ddd" stroke-width="2"/>

  <!-- Step 1: Profile -->
  <circle cx="80" cy="75" r="28" fill="#fff" stroke="#111" stroke-width="1.5"/>
  <!-- Magnifying glass icon -->
  <circle cx="76" cy="71" r="8" fill="none" stroke="#1a5276" stroke-width="1.5"/>
  <line x1="82" y1="77" x2="88" y2="83" stroke="#1a5276" stroke-width="1.5"/>
  <text x="80" y="118" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="12" font-weight="600" fill="#111">Profile</text>
  <text x="80" y="132" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">Measure</text>
  <!-- Arrow -->
  <polygon points="120,75 114,70 114,80" fill="#111"/>

  <!-- Step 2: Identify -->
  <circle cx="200" cy="75" r="28" fill="#fff" stroke="#111" stroke-width="1.5"/>
  <!-- Flag/marker icon -->
  <line x1="192" y1="60" x2="192" y2="90" stroke="#1a5276" stroke-width="1.5"/>
  <path d="M192,62 L208,68 L192,74" fill="#1a5276" opacity="0.7"/>
  <text x="200" y="118" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="12" font-weight="600" fill="#111">Identify</text>
  <text x="200" y="132" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">Bottlenecks</text>
  <!-- Arrow -->
  <polygon points="240,75 234,70 234,80" fill="#111"/>

  <!-- Step 3: Classify -->
  <circle cx="320" cy="75" r="28" fill="#fff" stroke="#111" stroke-width="1.5"/>
  <!-- Grid/category icon -->
  <rect x="308" y="63" width="10" height="10" fill="none" stroke="#1a5276" stroke-width="1"/>
  <rect x="322" y="63" width="10" height="10" fill="none" stroke="#1a5276" stroke-width="1"/>
  <rect x="308" y="77" width="10" height="10" fill="none" stroke="#1a5276" stroke-width="1"/>
  <rect x="322" y="77" width="10" height="10" fill="#1a5276" stroke="#1a5276" stroke-width="1" opacity="0.3"/>
  <text x="320" y="118" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="12" font-weight="600" fill="#111">Classify</text>
  <text x="320" y="132" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">Prioritize</text>
  <!-- Arrow -->
  <polygon points="360,75 354,70 354,80" fill="#111"/>

  <!-- Step 4: Optimize -->
  <circle cx="440" cy="75" r="28" fill="#1a5276" stroke="#111" stroke-width="1.5"/>
  <!-- Wrench/gear icon -->
  <circle cx="440" cy="75" r="8" fill="none" stroke="#fff" stroke-width="1.5"/>
  <circle cx="440" cy="75" r="3" fill="#fff"/>
  <text x="440" y="118" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="12" font-weight="600" fill="#111">Optimize</text>
  <text x="440" y="132" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">Implement</text>
  <!-- Arrow -->
  <polygon points="480,75 474,70 474,80" fill="#111"/>

  <!-- Step 5: Measure -->
  <circle cx="560" cy="75" r="28" fill="#fff" stroke="#111" stroke-width="1.5"/>
  <!-- Chart/bar icon -->
  <rect x="548" y="80" width="5" height="10" fill="#1a5276"/>
  <rect x="555" y="70" width="5" height="20" fill="#1a5276"/>
  <rect x="562" y="65" width="5" height="25" fill="#1a5276"/>
  <text x="560" y="118" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="12" font-weight="600" fill="#111">Measure</text>
  <text x="560" y="132" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">Validate</text>

  <!-- Top label -->
  <text x="320" y="20" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" fill="#888">Optimization Methodology</text>
</svg>