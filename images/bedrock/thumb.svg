<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#f7f7f7"/>

  <!-- Config file icons (left side, stacked) -->
  <!-- File 1 -->
  <rect x="60" y="80" width="56" height="68" rx="3" fill="#fff" stroke="#111" stroke-width="1.5"/>
  <path d="M92,80 L92,96 L116,96" fill="none" stroke="#111" stroke-width="1.5"/>
  <line x1="72" y1="108" x2="104" y2="108" stroke="#ccc" stroke-width="2"/>
  <line x1="72" y1="118" x2="96" y2="118" stroke="#ccc" stroke-width="2"/>
  <line x1="72" y1="128" x2="100" y2="128" stroke="#ccc" stroke-width="2"/>
  <line x1="72" y1="138" x2="88" y2="138" stroke="#ccc" stroke-width="2"/>

  <!-- File 2 (offset) -->
  <rect x="80" y="160" width="56" height="68" rx="3" fill="#fff" stroke="#111" stroke-width="1.5"/>
  <path d="M112,160 L112,176 L136,176" fill="none" stroke="#111" stroke-width="1.5"/>
  <line x1="92" y1="188" x2="124" y2="188" stroke="#ccc" stroke-width="2"/>
  <line x1="92" y1="198" x2="116" y2="198" stroke="#ccc" stroke-width="2"/>
  <line x1="92" y1="208" x2="120" y2="208" stroke="#ccc" stroke-width="2"/>

  <!-- Dots for more files -->
  <circle cx="88" cy="248" r="3" fill="#888"/>
  <circle cx="102" cy="248" r="3" fill="#888"/>
  <circle cx="116" cy="248" r="3" fill="#888"/>

  <!-- Arrow -->
  <line x1="160" y1="150" x2="220" y2="150" stroke="#111" stroke-width="2"/>
  <polygon points="220,150 212,144 212,156" fill="#111"/>

  <!-- Shield (Guardrails) -->
  <path d="M300,70 L300,70 C300,70 260,85 260,85 L260,170 C260,210 300,240 300,240 C300,240 340,210 340,170 L340,85 Z"
        fill="#1a5276" stroke="#111" stroke-width="2"/>

  <!-- Checkmark inside shield -->
  <path d="M278,150 L295,167 L325,127" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
