<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" width="640" height="280">
  <rect width="640" height="280" fill="#f7f7f7"/>

  <!-- Title -->
  <text x="320" y="25" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="14" font-weight="600" fill="#111">Console Decoupling</text>

  <!-- BEFORE label -->
  <text x="160" y="52" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="12" font-weight="600" fill="#888">Before</text>

  <!-- Before: One large Bedrock Console box -->
  <rect x="40" y="60" width="240" height="190" rx="2" fill="#fff" stroke="#111" stroke-width="1.5"/>
  <text x="160" y="85" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="13" font-weight="600" fill="#111">Bedrock Console</text>

  <!-- Sections inside the big box -->
  <rect x="55" y="95" width="210" height="30" rx="2" fill="#f7f7f7" stroke="#ddd" stroke-width="1"/>
  <text x="160" y="115" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" fill="#888">Model Management</text>

  <rect x="55" y="132" width="210" height="30" rx="2" fill="#f7f7f7" stroke="#ddd" stroke-width="1"/>
  <text x="160" y="152" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" fill="#888">Playground</text>

  <!-- Guardrails section highlighted -->
  <rect x="55" y="169" width="210" height="35" rx="2" fill="#1a5276" stroke="#111" stroke-width="1"/>
  <text x="160" y="191" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" font-weight="600" fill="#fff">Guardrails</text>

  <rect x="55" y="211" width="210" height="28" rx="2" fill="#f7f7f7" stroke="#ddd" stroke-width="1"/>
  <text x="160" y="230" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" fill="#888">Other Features...</text>

  <!-- Tight coupling indicator -->
  <text x="160" y="265" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">Tightly coupled</text>

  <!-- Arrow between before and after -->
  <line x1="295" y1="155" x2="345" y2="155" stroke="#111" stroke-width="1.5"/>
  <polygon points="345,155 337,150 337,160" fill="#111"/>

  <!-- AFTER label -->
  <text x="480" y="52" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="12" font-weight="600" fill="#888">After</text>

  <!-- After: Bedrock Core Console -->
  <rect x="360" y="60" width="250" height="95" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <text x="485" y="85" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="13" font-weight="600" fill="#111">Bedrock Core Console</text>
  <rect x="375" y="95" width="220" height="24" rx="2" fill="#f7f7f7" stroke="#ddd" stroke-width="1"/>
  <text x="485" y="112" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" fill="#888">Model Mgmt + Playground</text>
  <rect x="375" y="124" width="220" height="24" rx="2" fill="#f7f7f7" stroke="#ddd" stroke-width="1"/>
  <text x="485" y="141" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" fill="#888">Other Features</text>

  <!-- API Interface line -->
  <line x1="370" y1="170" x2="600" y2="170" stroke="#1a5276" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="485" y="183" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#1a5276">API Interface</text>

  <!-- After: Guardrails Console -->
  <rect x="360" y="195" width="250" height="55" rx="2" fill="#1a5276" stroke="#111" stroke-width="1"/>
  <text x="485" y="220" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="13" font-weight="600" fill="#fff">Guardrails Console</text>
  <text x="485" y="238" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" fill="#fff" opacity="0.8">Independent deployment</text>

  <!-- Decoupled label -->
  <text x="485" y="268" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">Loosely coupled via API</text>
</svg>