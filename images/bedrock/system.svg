<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320">
  <rect width="640" height="320" fill="#f7f7f7"/>

  <!-- Title -->
  <text x="320" y="25" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="14" font-weight="600" fill="#111">Guardrails System Overview</text>

  <!-- Config file icon (top) -->
  <rect x="280" y="42" width="80" height="38" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <!-- File fold corner -->
  <path d="M345,42 L360,42 L360,57 L345,57 Z" fill="#f7f7f7" stroke="#111" stroke-width="0.5"/>
  <path d="M345,42 L345,57 L360,57" fill="none" stroke="#111" stroke-width="0.5"/>
  <text x="315" y="62" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">config</text>
  <text x="315" y="73" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">.json</text>

  <!-- Arrow from config to guardrails -->
  <line x1="320" y1="80" x2="320" y2="105" stroke="#111" stroke-width="1"/>
  <polygon points="320,105 316,98 324,98" fill="#111"/>

  <!-- Center: Guardrails Engine -->
  <rect x="220" y="110" width="200" height="65" rx="2" fill="#1a5276" stroke="#111" stroke-width="1"/>
  <text x="320" y="138" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="14" font-weight="600" fill="#fff">Guardrails Engine</text>
  <text x="320" y="158" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" fill="#fff" opacity="0.8">Policy Evaluation</text>

  <!-- Left inputs -->
  <!-- Text Models -->
  <rect x="30" y="85" width="130" height="35" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <text x="95" y="107" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" fill="#111">Text Models</text>

  <!-- Image Models -->
  <rect x="30" y="130" width="130" height="35" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <text x="95" y="152" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" fill="#111">Image Models</text>

  <!-- Video Models -->
  <rect x="30" y="175" width="130" height="35" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <text x="95" y="197" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" fill="#111">Video Models</text>

  <!-- Arrows from inputs -->
  <line x1="160" y1="102" x2="220" y2="130" stroke="#111" stroke-width="1"/>
  <polygon points="220,130 213,124 215,132" fill="#111"/>

  <line x1="160" y1="147" x2="220" y2="142" stroke="#111" stroke-width="1"/>
  <polygon points="220,142 212,138 212,146" fill="#111"/>

  <line x1="160" y1="192" x2="220" y2="160" stroke="#111" stroke-width="1"/>
  <polygon points="220,160 215,158 213,166" fill="#111"/>

  <!-- Right output -->
  <rect x="480" y="118" width="135" height="50" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <text x="547" y="140" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" font-weight="600" fill="#111">Policy Applied</text>
  <text x="547" y="155" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" font-weight="600" fill="#111">Response</text>

  <!-- Arrow to output -->
  <line x1="420" y1="142" x2="480" y2="142" stroke="#111" stroke-width="1"/>
  <polygon points="480,142 472,137 472,147" fill="#111"/>

  <!-- Policy types below -->
  <rect x="80" y="235" width="115" height="55" rx="2" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="137" y="257" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" font-weight="600" fill="#111">Content Filter</text>
  <text x="137" y="273" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">Toxicity, PII</text>

  <rect x="215" y="235" width="115" height="55" rx="2" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="272" y="257" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" font-weight="600" fill="#111">Topic Block</text>
  <text x="272" y="273" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">Deny lists</text>

  <rect x="350" y="235" width="115" height="55" rx="2" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="407" y="257" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" font-weight="600" fill="#111">Word Filter</text>
  <text x="407" y="273" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">Custom words</text>

  <rect x="485" y="235" width="115" height="55" rx="2" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="542" y="257" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" font-weight="600" fill="#111">Grounding</text>
  <text x="542" y="273" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">Fact check</text>

  <!-- Dotted lines from engine to policies -->
  <line x1="280" y1="175" x2="137" y2="235" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="305" y1="175" x2="272" y2="235" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="340" y1="175" x2="407" y2="235" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="365" y1="175" x2="542" y2="235" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>
</svg>