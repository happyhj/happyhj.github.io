<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" width="640" height="280">
  <rect width="640" height="280" fill="#f7f7f7"/>

  <!-- Title -->
  <text x="320" y="25" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="14" font-weight="600" fill="#111">After: Config-Driven Factory</text>

  <!-- Model boxes at top -->
  <rect x="40" y="50" width="90" height="40" rx="2" fill="#1a5276" stroke="#111" stroke-width="1"/>
  <text x="85" y="75" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="12" font-weight="600" fill="#fff">Model A</text>

  <rect x="155" y="50" width="90" height="40" rx="2" fill="#1a5276" stroke="#111" stroke-width="1"/>
  <text x="200" y="75" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="12" font-weight="600" fill="#fff">Model B</text>

  <rect x="270" y="50" width="90" height="40" rx="2" fill="#1a5276" stroke="#111" stroke-width="1"/>
  <text x="315" y="75" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="12" font-weight="600" fill="#fff">Model C</text>

  <text x="395" y="75" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="16" fill="#888">...</text>

  <rect x="420" y="50" width="90" height="40" rx="2" fill="#1a5276" stroke="#111" stroke-width="1"/>
  <text x="465" y="75" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="12" font-weight="600" fill="#fff">Model N</text>

  <!-- Arrows all converging down -->
  <line x1="85" y1="90" x2="280" y2="120" stroke="#111" stroke-width="1"/>
  <line x1="200" y1="90" x2="295" y2="120" stroke="#111" stroke-width="1"/>
  <line x1="315" y1="90" x2="320" y2="120" stroke="#111" stroke-width="1"/>
  <line x1="465" y1="90" x2="360" y2="120" stroke="#111" stroke-width="1"/>

  <!-- Single Config-Driven Factory box -->
  <rect x="170" y="120" width="300" height="50" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
  <text x="320" y="142" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="14" font-weight="600" fill="#111">Config-Driven Factory</text>
  <text x="320" y="160" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" fill="#888">Single codebase, multiple configs</text>

  <!-- Arrows down to config files -->
  <line x1="200" y1="170" x2="120" y2="200" stroke="#111" stroke-width="1"/>
  <polygon points="120,200 126,193 119,193" fill="#111"/>
  <line x1="280" y1="170" x2="260" y2="200" stroke="#111" stroke-width="1"/>
  <polygon points="260,200 264,193 256,193" fill="#111"/>
  <line x1="360" y1="170" x2="390" y2="200" stroke="#111" stroke-width="1"/>
  <polygon points="390,200 394,193 386,193" fill="#111"/>
  <line x1="440" y1="170" x2="520" y2="200" stroke="#111" stroke-width="1"/>
  <polygon points="520,200 524,193 516,193" fill="#111"/>

  <!-- Config JSON files (uniform) -->
  <rect x="80" y="200" width="80" height="38" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <text x="120" y="216" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#111">a.config</text>
  <text x="120" y="230" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">.json</text>

  <rect x="220" y="200" width="80" height="38" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <text x="260" y="216" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#111">b.config</text>
  <text x="260" y="230" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">.json</text>

  <rect x="350" y="200" width="80" height="38" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <text x="390" y="216" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#111">c.config</text>
  <text x="390" y="230" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">.json</text>

  <rect x="480" y="200" width="80" height="38" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <text x="520" y="216" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#111">n.config</text>
  <text x="520" y="230" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">.json</text>

  <!-- Label -->
  <line x1="40" y1="250" x2="600" y2="250" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="320" y="268" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="12" fill="#1a5276" font-weight="600">One config file per model -- zero code changes</text>
</svg>