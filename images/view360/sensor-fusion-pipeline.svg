<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 240" width="640" height="240">
  <rect width="640" height="240" fill="#f7f7f7"/>

  <!-- Gyroscope box -->
  <rect x="30" y="35" width="130" height="44" rx="2" fill="#1a5276" stroke="#111" stroke-width="1"/>
  <text x="95" y="62" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="13" font-weight="600" fill="#fff">Gyroscope</text>

  <!-- Accelerometer box -->
  <rect x="30" y="145" width="130" height="44" rx="2" fill="#1a5276" stroke="#111" stroke-width="1"/>
  <text x="95" y="172" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="13" font-weight="600" fill="#fff">Accelerometer</text>

  <!-- Labels for sensor characteristics -->
  <text x="95" y="95" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" fill="#888">short-term accurate</text>
  <text x="95" y="205" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" fill="#888">long-term stable</text>

  <!-- Arrow from Gyroscope -->
  <line x1="160" y1="57" x2="240" y2="100" stroke="#111" stroke-width="1"/>
  <polygon points="240,100 232,94 234,102" fill="#111"/>

  <!-- Arrow from Accelerometer -->
  <line x1="160" y1="167" x2="240" y2="124" stroke="#111" stroke-width="1"/>
  <polygon points="240,124 234,122 232,130" fill="#111"/>

  <!-- Complementary Filter box -->
  <rect x="245" y="88" width="150" height="48" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <text x="320" y="108" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="12" font-weight="600" fill="#111">Complementary</text>
  <text x="320" y="124" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="12" font-weight="600" fill="#111">Filter</text>

  <!-- Arrow to SLERP -->
  <line x1="395" y1="112" x2="430" y2="112" stroke="#111" stroke-width="1"/>
  <polygon points="430,112 422,108 422,116" fill="#111"/>

  <!-- SLERP Blending box -->
  <rect x="435" y="88" width="100" height="48" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <text x="485" y="108" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="12" font-weight="600" fill="#111">SLERP</text>
  <text x="485" y="124" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="12" font-weight="600" fill="#111">Blending</text>

  <!-- Arrow to output -->
  <line x1="535" y1="112" x2="555" y2="112" stroke="#111" stroke-width="1"/>
  <polygon points="555,112 547,108 547,116" fill="#111"/>

  <!-- Stable Orientation output -->
  <rect x="560" y="88" width="60" height="48" rx="2" fill="#1a5276" stroke="#111" stroke-width="1"/>
  <text x="590" y="108" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" font-weight="600" fill="#fff">Stable</text>
  <text x="590" y="122" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" font-weight="600" fill="#fff">Orient.</text>

  <!-- Flow label at top -->
  <text x="320" y="22" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" fill="#888">Sensor Fusion Pipeline</text>
</svg>