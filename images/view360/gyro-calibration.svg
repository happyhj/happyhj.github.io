<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200">
  <rect width="640" height="200" fill="#f7f7f7"/>

  <!-- Step 1: Device stationary detected -->
  <rect x="20" y="45" width="170" height="100" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <rect x="20" y="45" width="170" height="24" rx="2" fill="#1a5276"/>
  <rect x="20" y="67" width="170" height="0.5" fill="#1a5276"/>
  <text x="105" y="62" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" font-weight="600" fill="#fff">Step 1</text>
  <!-- Clock icon -->
  <circle cx="70" cy="100" r="14" fill="none" stroke="#111" stroke-width="1"/>
  <line x1="70" y1="100" x2="70" y2="90" stroke="#111" stroke-width="1.5"/>
  <line x1="70" y1="100" x2="78" y2="100" stroke="#111" stroke-width="1.5"/>
  <!-- Event stream with gap -->
  <line x1="95" y1="90" x2="95" y2="85" stroke="#111" stroke-width="1"/>
  <line x1="100" y1="90" x2="100" y2="82" stroke="#111" stroke-width="1"/>
  <line x1="105" y1="90" x2="105" y2="87" stroke="#111" stroke-width="1"/>
  <line x1="115" y1="90" x2="115" y2="90" stroke="#ddd" stroke-width="1"/>
  <line x1="120" y1="90" x2="120" y2="90" stroke="#ddd" stroke-width="1"/>
  <line x1="125" y1="90" x2="125" y2="90" stroke="#ddd" stroke-width="1"/>
  <text x="120" y="98" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="9" fill="#888">...quiet...</text>
  <text x="105" y="132" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" fill="#555">Detect stationary</text>
  <text x="105" y="142" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" fill="#555">device state</text>

  <!-- Arrow 1→2 -->
  <line x1="190" y1="95" x2="225" y2="95" stroke="#111" stroke-width="1"/>
  <polygon points="225,95 218,91 218,99" fill="#111"/>

  <!-- Step 2: Capture zero-point offset -->
  <rect x="230" y="45" width="170" height="100" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <rect x="230" y="45" width="170" height="24" rx="2" fill="#1a5276"/>
  <rect x="230" y="67" width="170" height="0.5" fill="#1a5276"/>
  <text x="315" y="62" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" font-weight="600" fill="#fff">Step 2</text>
  <!-- Measurement display -->
  <rect x="260" y="78" width="110" height="30" rx="1" fill="#f7f7f7" stroke="#ddd" stroke-width="0.5"/>
  <text x="315" y="90" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" fill="#1a5276">x: 0.0023</text>
  <text x="315" y="102" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" fill="#1a5276">y:-0.0018</text>
  <text x="315" y="132" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" fill="#555">Capture zero-point</text>
  <text x="315" y="142" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" fill="#555">offset values</text>

  <!-- Arrow 2→3 -->
  <line x1="400" y1="95" x2="435" y2="95" stroke="#111" stroke-width="1"/>
  <polygon points="435,95 428,91 428,99" fill="#111"/>

  <!-- Step 3: Subtract from readings -->
  <rect x="440" y="45" width="170" height="100" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
  <rect x="440" y="45" width="170" height="24" rx="2" fill="#1a5276"/>
  <rect x="440" y="67" width="170" height="0.5" fill="#1a5276"/>
  <text x="525" y="62" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" font-weight="600" fill="#fff">Step 3</text>
  <!-- Corrected output -->
  <text x="525" y="88" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" fill="#888">raw - offset</text>
  <text x="525" y="105" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" fill="#111">= corrected</text>
  <!-- Check mark -->
  <path d="M505,115 L520,128 L545,105" fill="none" stroke="#1a5276" stroke-width="2"/>
  <text x="525" y="142" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="10" fill="#555">Subtract offset</text>

  <!-- Title -->
  <text x="320" y="25" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" fill="#888">Gyroscope Auto-Calibration Flow</text>

  <!-- Bottom flow label -->
  <text x="320" y="180" text-anchor="middle" font-family="'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace" font-size="11" fill="#888">Runs continuously during idle periods</text>
</svg>